<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segview Solar - Simulador de Economia</title>
    <style>
        :root {
            --bg-color: #000000;
            --segview-green: #A6CE39;
            --segview-blue: #00AEEF;
            --segview-gray: #939598;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #app-container {
            width: 100%;
            max-width: 400px;
            background-color: #111111;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 174, 239, 0.1);
            border: 1px solid #222;
        }

        .screen {
            display: none;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.4s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: var(--segview-green);
            font-size: 24px;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            font-size: 20px;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: var(--segview-gray);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            color: var(--segview-gray);
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #333;
            background-color: #000000;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--segview-blue);
        }

        input::placeholder {
            color: #555;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            background-color: var(--segview-green);
            color: #000000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Result Screen Styles */
        .result-card {
            background-color: #000000;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .result-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-label {
            color: var(--segview-gray);
            font-size: 14px;
        }

        .result-value {
            color: var(--segview-green);
            font-weight: bold;
            font-size: 16px;
        }

        .highlight-box {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: rgba(0, 174, 239, 0.1);
            border: 1px solid var(--segview-blue);
            margin: 10px 0;
        }

        .highlight-box p {
            color: var(--segview-gray);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .highlight-box .big-value {
            color: var(--segview-green);
            font-size: 28px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div id="app-container">
        
        <!-- TELA 1: Identificação -->
        <div id="screen-1" class="screen active">
            <h1>Economize com o Sol ☀️</h1>
            <p class="subtitle">Descubra o quanto você pode economizar na sua conta de luz.</p>
            
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: João da Silva">
            </div>
            
            <div class="input-group">
                <label for="whatsapp">WhatsApp</label>
                <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" maxlength="15">
            </div>
            
            <button onclick="goToScreen(2)">Avançar</button>
        </div>

        <!-- TELA 2: Simulador -->
        <div id="screen-2" class="screen">
            <h2>Simulador</h2>
            
            <div class="input-group">
                <label for="distribuidora">Distribuidora</label>
                <select id="distribuidora">
                    <option value="LIGHT">LIGHT</option>
                    <option value="ENEL RJ">ENEL RJ</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="valorConta">Valor da última conta (R$)</label>
                <input type="number" id="valorConta" placeholder="Ex: 350.00" step="0.01" min="0">
            </div>
            
            <button onclick="calculateAndGoToScreen3()">Calcular Economia</button>
            <button onclick="goToScreen(1)" style="background-color: transparent; border: 1px solid var(--segview-gray); color: var(--segview-gray); margin-top: 0;">Voltar</button>
        </div>

        <!-- TELA 3: Resultado -->
        <div id="screen-3" class="screen">
            <h2>Seu Resultado</h2>
            
            <div class="result-card">
                <div class="result-item">
                    <span class="result-label">Economia Mensal:</span>
                    <span class="result-value" id="res-mensal">R$ 0,00</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Economia Anual:</span>
                    <span class="result-value" id="res-anual">R$ 0,00</span>
                </div>
                <div class="result-item">
                    <span class="result-label">CO2 Poupado:</span>
                    <span class="result-value" id="res-co2">0 kg</span>
                </div>
            </div>

            <div class="highlight-box">
                <p>Sua economia anual estimada:</p>
                <div class="big-value" id="res-destaque">R$ 0,00</div>
            </div>
            
            <button onclick="sendWhatsApp()">Criar Proposta via WhatsApp</button>
            <button onclick="goToScreen(1)" style="background-color: transparent; border: 1px solid var(--segview-gray); color: var(--segview-gray); margin-top: 0;">Refazer Simulação</button>
        </div>

    </div>

    <script>
        // Store user data
        const userData = {
            nome: '',
            whatsapp: '',
            distribuidora: 'LIGHT',
            valorConta: 0,
            economiaMensal: 0,
            economiaAnual: 0,
            co2Poupado: 0
        };

        // WhatsApp Mask
        document.getElementById('whatsapp').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        // Navigation
        function goToScreen(screenNumber) {
            if (screenNumber === 2) {
                const nome = document.getElementById('nome').value.trim();
                const whatsapp = document.getElementById('whatsapp').value.trim();
                
                if (!nome || whatsapp.length < 14) {
                    alert('Por favor, preencha seu nome e um WhatsApp válido.');
                    return;
                }
                userData.nome = nome;
                userData.whatsapp = whatsapp;
            }

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${screenNumber}`).classList.add('active');
        }

        // Calculation and API Call
        function calculateAndGoToScreen3() {
            const distribuidora = document.getElementById('distribuidora').value;
            const valorConta = parseFloat(document.getElementById('valorConta').value);

            if (isNaN(valorConta) || valorConta <= 0) {
                alert('Por favor, insira um valor de conta válido.');
                return;
            }

            userData.distribuidora = distribuidora;
            userData.valorConta = valorConta;

            // Lógica de Negócio
            userData.economiaMensal = valorConta * 0.14; // 14% de desconto
            userData.economiaAnual = userData.economiaMensal * 12;
            userData.co2Poupado = userData.economiaAnual * 0.89; // R$ 1 = 0.89kg CO2

            // Formatação
            const formatCurrency = (value) => value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            const formatNumber = (value) => value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            // Atualizar UI
            document.getElementById('res-mensal').textContent = formatCurrency(userData.economiaMensal);
            document.getElementById('res-anual').textContent = formatCurrency(userData.economiaAnual);
            document.getElementById('res-destaque').textContent = formatCurrency(userData.economiaAnual);
            document.getElementById('res-co2').textContent = formatNumber(userData.co2Poupado) + ' kg';

            // Enviar dados para a planilha
            sendToSpreadsheet();

            // Mudar de tela
            goToScreen(3);
        }

        // Fetch API (Google Apps Script)
        function sendToSpreadsheet() {
            const url = 'https://script.google.com/macros/s/AKfycbwwYXTVw0ZjVl1VFyNrKJQlu4jVK_MX4mjcbYZt8BTybYB14IUpX_iMg9SlPziKNF-N2g/exec';
            
            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(userData)
            }).then(() => {
                console.log('Dados enviados com sucesso.');
            }).catch(error => {
                console.error('Erro ao enviar dados:', error);
            });
        }

        // WhatsApp Redirect
        function sendWhatsApp() {
            const numero = 'SEU_NUMERO_AQUI';
            const formatCurrency = (value) => value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            const valorAnualFormatado = formatCurrency(userData.economiaAnual);
            
            const texto = `Olá, meu nome é ${userData.nome} e acabei de simular uma economia de ${valorAnualFormatado} com a Segview Solar!`;
            const url = `https://wa.me/+5521992279491?text=${encodeURIComponent(texto)}`;
            
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
